openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Commercial Insurance Form API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: applications
    description: Insurance application operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /applications:
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create a new insurance application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationRequest"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get an insurance application by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update an insurance application (used between stages)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationRequest"
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /applications/{id}/submit:
    post:
      operationId: submitApplication
      tags: [applications]
      summary: Submit the completed insurance application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "400":
          description: Application incomplete or already submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error

    CreateApplicationRequest:
      type: object
      properties:
        businessName:
          type: string
        businessType:
          type: string
          enum:
            - sole_proprietorship
            - partnership
            - llc
            - corporation
            - nonprofit
        industry:
          type: string
        yearsInBusiness:
          type: integer
          minimum: 0
        annualRevenue:
          type: number
          minimum: 0
        numberOfEmployees:
          type: integer
          minimum: 0
        businessAddress:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
      required:
        - businessName
        - businessType
        - industry
        - yearsInBusiness
        - annualRevenue
        - numberOfEmployees
        - businessAddress
        - city
        - state
        - zipCode

    UpdateApplicationRequest:
      type: object
      properties:
        coverageTypes:
          type: array
          items:
            type: string
            enum:
              - general_liability
              - commercial_property
              - workers_compensation
              - professional_liability
              - commercial_auto
              - cyber_liability
              - umbrella
        coverageLimit:
          type: string
          enum:
            - "500000"
            - "1000000"
            - "2000000"
            - "5000000"
        deductible:
          type: string
          enum:
            - "500"
            - "1000"
            - "2500"
            - "5000"
        effectiveDate:
          type: string
        hasPriorClaims:
          type: boolean
        priorClaimsDescription:
          type: string
        hasHazardousMaterials:
          type: boolean
        isHomeBasedBusiness:
          type: boolean
        operatesMultipleLocations:
          type: boolean
        contactFirstName:
          type: string
        contactLastName:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        contactTitle:
          type: string
        additionalNotes:
          type: string
        currentStage:
          type: integer
          minimum: 1
          maximum: 4

    ApplicationResponse:
      type: object
      properties:
        id:
          type: integer
        businessName:
          type: string
        businessType:
          type: string
        industry:
          type: string
        yearsInBusiness:
          type: integer
        annualRevenue:
          type: number
        numberOfEmployees:
          type: integer
        businessAddress:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        coverageTypes:
          type: array
          items:
            type: string
        coverageLimit:
          type: string
          nullable: true
        deductible:
          type: string
          nullable: true
        effectiveDate:
          type: string
          nullable: true
        hasPriorClaims:
          type: boolean
          nullable: true
        priorClaimsDescription:
          type: string
          nullable: true
        hasHazardousMaterials:
          type: boolean
          nullable: true
        isHomeBasedBusiness:
          type: boolean
          nullable: true
        operatesMultipleLocations:
          type: boolean
          nullable: true
        contactFirstName:
          type: string
          nullable: true
        contactLastName:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactTitle:
          type: string
          nullable: true
        additionalNotes:
          type: string
          nullable: true
        currentStage:
          type: integer
        status:
          type: string
          enum:
            - draft
            - submitted
        submittedAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - businessName
        - businessType
        - industry
        - yearsInBusiness
        - annualRevenue
        - numberOfEmployees
        - businessAddress
        - city
        - state
        - zipCode
        - coverageTypes
        - currentStage
        - status
        - createdAt
        - updatedAt
