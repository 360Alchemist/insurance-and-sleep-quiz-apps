<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Coverage Needs — Commercial Insurance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="form-wrapper">

  <div class="step-indicator">
    <div class="step-item">
      <div class="step-circle completed">✓</div>
      <span class="step-label">Business</span>
    </div>
    <div class="step-connector completed"></div>
    <div class="step-item">
      <div class="step-circle active">2</div>
      <span class="step-label active">Coverage</span>
    </div>
    <div class="step-connector"></div>
    <div class="step-item">
      <div class="step-circle">3</div>
      <span class="step-label">Risk</span>
    </div>
    <div class="step-connector"></div>
    <div class="step-item">
      <div class="step-circle">4</div>
      <span class="step-label">Contact</span>
    </div>
  </div>

  <div class="form-card">
    <h2>Coverage Needs</h2>
    <p class="subtitle">Select the types of coverage your business needs.</p>

    <form th:action="@{/step2}" th:object="${step2}" method="post" novalidate>

      <div class="mb-4">
        <label class="form-label">Coverage Types * <small class="text-muted fw-normal">(select all that apply)</small></label>

        <div th:if="${#fields.hasErrors('coverageTypes')}" class="text-danger small mb-2"
             th:errors="*{coverageTypes}"></div>

        <div class="d-flex flex-column gap-2">
          <label class="coverage-option" th:each="type : ${ {'general_liability','professional_liability','property','workers_comp','commercial_auto','cyber_liability','umbrella','business_interruption'} }"
                 th:id="'lbl-' + ${type}">
            <input type="checkbox" name="coverageTypes" th:value="${type}"
                   th:checked="${step2.coverageTypes != null and step2.coverageTypes.contains(type)}"
                   onchange="updateSelected(this)"/>
            <div>
              <div class="opt-title" th:text="${
                type == 'general_liability' ? 'General Liability' :
                type == 'professional_liability' ? 'Professional Liability (E&amp;O)' :
                type == 'property' ? 'Commercial Property' :
                type == 'workers_comp' ? 'Workers\' Compensation' :
                type == 'commercial_auto' ? 'Commercial Auto' :
                type == 'cyber_liability' ? 'Cyber Liability' :
                type == 'umbrella' ? 'Umbrella / Excess Liability' :
                'Business Interruption'
              }"></div>
              <div class="opt-desc" th:text="${
                type == 'general_liability' ? 'Covers third-party bodily injury and property damage claims' :
                type == 'professional_liability' ? 'Protects against claims of negligence or mistakes in your work' :
                type == 'property' ? 'Covers physical assets including building and equipment' :
                type == 'workers_comp' ? 'Required in most states; covers employee injuries and illnesses' :
                type == 'commercial_auto' ? 'Coverage for vehicles used in your business operations' :
                type == 'cyber_liability' ? 'Protects against data breaches and cyberattacks' :
                type == 'umbrella' ? 'Additional coverage beyond your primary policy limits' :
                'Covers lost income if your business must temporarily close'
              }"></div>
            </div>
          </label>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Coverage Limit *</label>
          <select class="form-select" th:field="*{coverageLimit}"
                  th:classappend="${#fields.hasErrors('coverageLimit')} ? 'is-invalid'">
            <option value="">Select limit...</option>
            <option value="300000">$300,000</option>
            <option value="500000">$500,000</option>
            <option value="1000000">$1,000,000</option>
            <option value="2000000">$2,000,000</option>
            <option value="5000000">$5,000,000</option>
          </select>
          <div class="invalid-feedback" th:errors="*{coverageLimit}"></div>
        </div>
        <div class="col-6">
          <label class="form-label">Deductible *</label>
          <select class="form-select" th:field="*{deductible}"
                  th:classappend="${#fields.hasErrors('deductible')} ? 'is-invalid'">
            <option value="">Select deductible...</option>
            <option value="500">$500</option>
            <option value="1000">$1,000</option>
            <option value="2500">$2,500</option>
            <option value="5000">$5,000</option>
            <option value="10000">$10,000</option>
          </select>
          <div class="invalid-feedback" th:errors="*{deductible}"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Desired Effective Date *</label>
        <input type="date" class="form-control" th:field="*{effectiveDate}"
               th:classappend="${#fields.hasErrors('effectiveDate')} ? 'is-invalid'"/>
        <div class="invalid-feedback" th:errors="*{effectiveDate}"></div>
      </div>

      <div class="btn-row">
        <a href="/back/step2" class="btn-back">← Back</a>
        <button type="submit" class="btn-primary-custom">Continue →</button>
      </div>
    </form>
  </div>
</div>
<script>
  function updateSelected(checkbox) {
    const label = checkbox.closest('.coverage-option');
    if (checkbox.checked) label.classList.add('selected');
    else label.classList.remove('selected');
  }
  // Init on load
  document.querySelectorAll('.coverage-option input[type=checkbox]:checked').forEach(cb => {
    cb.closest('.coverage-option').classList.add('selected');
  });
</script>
</body>
</html>
